<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You – QA Fitness</title>
  <link rel="stylesheet" href="forms.css">

  <style>
    .thankyou-wrapper {
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(20px); }
      to { opacity:1; transform:translateY(0); }
    }

    .thankyou-card {
      background:rgba(15,23,42,0.95);
      border-radius:18px;
      padding:60px 40px;
      max-width:600px;
      width:100%;
      text-align:center;
      box-shadow:0 25px 60px rgba(0,0,0,0.6);
      border:1px solid rgba(148,163,184,0.25);
    }

    .thankyou-icon {
      font-size:4rem;
      margin-bottom:10px;
      color:#22c55e;
      text-shadow:0 0 20px rgba(34,197,94,0.7);
    }

    .thankyou-title {
      font-size:2rem;
      font-weight:bold;
      margin-bottom:10px;
    }

    .thankyou-text {
      font-size:1.1rem;
      color:#9ca3af;
      line-height:1.6;
      margin-bottom:30px;
    }

    .btn-home {
      display:inline-block;
      padding:12px 28px;
      border-radius:999px;
      background:linear-gradient(135deg,#1d4ed8,#22c55e);
      color:white;
      text-decoration:none;
      font-size:1rem;
      transition:0.25s;
      box-shadow:0 10px 25px rgba(37,99,235,0.5);
    }

    .btn-home:hover {
      transform:translateY(-2px);
      box-shadow:0 14px 30px rgba(37,99,235,0.7);
    }
  </style>
</head>
<body>

  <div class="thankyou-wrapper">
    <div class="thankyou-card">

      <div class="thankyou-icon">✔️</div>

      <div class="thankyou-title">Thank You for Choosing Us!</div>

      <p class="thankyou-text">
        Your registration is now complete.  
        We’re excited to have you as part of the <strong>QA Fitness</strong> family.  
        One of our trainers will reach out to you shortly to begin your journey.
      </p>

      <a href="form.html" class="btn-home">Return to Home</a>

    </div>
  </div>

</body>
</html>
