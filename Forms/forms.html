<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QA Fitness - Registration Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <h2>QA Fitness — Registration</h2>
    <p class="lead">Choose 7-day free trial or pick a membership package and submit to register.</p>

    <form id="regForm">

      <!-- Registration Type -->
      <label>Registration Type</label>
      <div class="radio-row">
        <label><input type="radio" name="type" value="trial" checked> 7-Day Free Trial</label>
        <label><input type="radio" name="type" value="membership"> Membership</label>
      </div>

      <!-- Membership Plans -->
      <div id="membershipOptions" class="hidden">
        <label for="plan">Plans & Packages</label>
        <select id="plan" name="plan">
          <option value="">-- Select Plan --</option>
          <option value="Starter">Starter — £25</option>
          <option value="Pro Elite">Pro Elite — £45</option>
          <option value="Ultimate">Ultimate — £75</option>
        </select>
      </div>

      <!-- Personal Info -->
      <div class="section-title">Personal Information</div>

      <div class="form-row">
        <div class="half">
          <label>First Name *</label>
          <input name="firstName" required>
        </div>
        <div class="half">
          <label>Last Name *</label>
          <input name="lastName" required>
        </div>
      </div>

      <label>Email *</label>
      <input name="email" type="email" required>

      <div class="form-row">
        <div class="half">
          <label>Phone *</label>
          <input name="phone" required>
        </div>
        <div class="half">
          <label>Date of Birth *</label>
          <input name="dob" type="date" required>
        </div>
      </div>

      <!-- Weight + Height -->
      <div class="form-row">
        <div class="half">
          <label>Weight (kg)</label>
          <input name="weight" type="number" min="1">
        </div>
        <div class="half">
          <label>Height (cm)</label>
          <input name="height" type="number" min="1">
        </div>
      </div>

      <!-- Terms -->
      <label><input type="checkbox" id="agree" required> I agree to QA Fitness terms & policies.</label>

      <!-- Submit -->
      <div class="actions">
        <button type="submit">Submit Registration</button>
      </div>

      <p class="note">Selecting "Membership" requires choosing a plan.</p>
    </form>

    <!-- Result Box -->
    <div id="result" class="hidden result-box"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
